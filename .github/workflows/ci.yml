name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS / Swift ${{ matrix.swift }}
    runs-on: macos-14
    strategy:
      matrix:
        swift: ["6.0"]
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux / Swift ${{ matrix.swift }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        swift: ["6.0"]
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
